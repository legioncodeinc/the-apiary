<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); display: flex; gap: 48px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="col">
    <span class="lbl">eyebrow</span>
    <span class="eyebrow">The Pollinating Loop</span>
    <h3 style="margin-top:2px">Wakes up smarter</h3>
  </div>
  <div class="col">
    <span class="lbl">wordmark</span>
    <span class="wordmark" style="font-size:34px;color:var(--text-primary)">honeycomb</span>
  </div>
</body>
</html>
