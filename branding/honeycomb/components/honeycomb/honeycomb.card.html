<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); display: flex; flex-direction: column; gap: 16px; }
  .kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .mem { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { MemoryCard, Kpi } = window.HoneycombDesignSystem_d60529;
  function Demo() {
    return (
      <div style={{display:'flex', flexDirection:'column', gap:16}}>
        <div className="kpis">
          <Kpi label="Memories" value="1,284" delta={12} />
          <Kpi label="Sessions" value="312" accent="neutral" />
          <Kpi label="Est. savings" value="2.4" unit="M tok" accent="verified" delta={8} />
        </div>
        <div className="mem">
          <MemoryCard
            memoryKey="deploy/prd-022"
            snippet="We deploy from the prd-022 branch, never from main."
            source="~/.honeycomb/memory/deploy.md"
            score={0.94} scope="team" verified />
          <MemoryCard
            memoryKey="auth/token-drift"
            snippet="Re-mint the org token on org switch — heal before building the context block."
            source="session a7f3c · cursor"
            score={0.71} scope="org" pollinating />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
