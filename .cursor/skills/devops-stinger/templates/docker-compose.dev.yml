# Local dev stack — Next.js / Node app + Postgres + Redis + adminer.
# Source: guides/03-compose-for-dev.md.
# Run: docker compose --profile app up --watch
# DB-only: docker compose --profile db-only up
# With tools: docker compose --profile app --profile tools up --watch

services:
  app:
    profiles: ["app"]
    build:
      context: .
      target: dev
    environment:
      NODE_ENV: development
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml

  migrate:
    profiles: ["app"]
    build:
      context: .
      target: builder
    command: ["sh", "-c", "pnpm db:migrate:deploy"]
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    profiles: ["app", "db-only"]
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    profiles: ["app"]
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    profiles: ["tools"]
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mailcatcher:
    profiles: ["tools"]
    image: dockage/mailcatcher:0.9.0
    ports:
      - "1025:1025"  # SMTP
      - "1080:1080"  # web UI

volumes:
  postgres-data:
  redis-data:

secrets:
  database_url:
    file: ./.secrets/database_url
  postgres_password:
    file: ./.secrets/postgres_password

# Notes:
# - .secrets/ is gitignored AND dockerignored. Copy ./.secrets.example/ to ./.secrets/ and fill in.
# - The "app" target in Dockerfile must include `dev` stage (see templates/Dockerfile.next-app).
# - `develop.watch` requires Docker Compose 2.22+. Run with `--watch`.
