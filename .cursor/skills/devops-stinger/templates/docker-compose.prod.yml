# Production-shape compose — for self-hosted deploys or smoke testing the production image locally.
# Most teams deploy via the registry + orchestrator (ECS, Fargate, Fly, DOKS), not via Compose.
# Use this when you need a "production-like" local stack or single-host self-hosted deploy.
# Source: guides/09-pipeline-shapes.md.

services:
  app:
    image: ${IMAGE:-ghcr.io/me/app:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      REDIS_URL: redis://redis:6379
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  migrate:
    image: ${IMAGE:-ghcr.io/me/app:latest}
    command: ["node", "dist/migrate.js"]
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - database_url
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "300", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:

secrets:
  database_url:
    file: /etc/app/secrets/database_url
  postgres_password:
    file: /etc/app/secrets/postgres_password
