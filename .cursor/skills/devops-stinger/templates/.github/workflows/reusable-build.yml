# Reusable build workflow.
# Called by pr-build.yml and main-deploy.yml.
# Source: guides/05-actions-architecture.md §1, guides/07-depot-integration.md.

name: Reusable build

on:
  workflow_call:
    inputs:
      push:
        description: "Whether to push the built image to the registry"
        type: boolean
        default: false
      platforms:
        description: "Comma-separated platforms (e.g., linux/amd64,linux/arm64)"
        type: string
        default: linux/amd64
      tags:
        description: "Newline-separated image tags"
        type: string
        required: true
      sbom:
        description: "Generate SBOM with the build"
        type: boolean
        default: false
      provenance:
        description: "Provenance mode: false, mode=min, or mode=max"
        type: string
        default: "false"
    outputs:
      digest:
        description: "Image digest (sha256:...)"
        value: ${{ jobs.build.outputs.digest }}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write     # Depot OIDC + cloud OIDC
      packages: write     # only effective if pushing to GHCR
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@<sha>  # v4.2.2 — replace <sha> with 40-char commit SHA

      - name: Setup Depot
        uses: depot/setup-action@<sha>  # v1.x

      - name: Build (and optionally push)
        id: build
        uses: depot/build-push-action@<sha>  # v1.x — drop-in for docker/build-push-action
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          context: .
          file: ./Dockerfile
          target: runtime
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ inputs.tags }}
          sbom: ${{ inputs.sbom }}
          provenance: ${{ inputs.provenance }}
          # No cache-from / cache-to — Depot handles persistent NVMe cache automatically.
