# PR build — runs on every pull_request against main.
# Builds the image (no push), runs tests, runs Trivy scan with CRITICAL/HIGH gate.
# Source: guides/05-actions-architecture.md, guides/09-pipeline-shapes.md §1.

name: PR build

on:
  pull_request:
    branches: [main]

# Cancel previous in-progress builds when a new commit is pushed to the same PR.
concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Default to no permissions; each job opts in.
permissions: {}

jobs:
  lint-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@<sha>  # v4.2.2
      - uses: actions/setup-node@<sha>  # v4.x
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@<sha>  # v4.x
        with:
          run_install: false
      - name: Cache pnpm
        uses: actions/cache@<sha>  # v4.x
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

  build:
    needs: lint-test
    uses: ./.github/workflows/reusable-build.yml
    with:
      push: false
      platforms: linux/amd64
      tags: |
        app:pr-${{ github.event.pull_request.number }}

  scan:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write   # for SARIF upload to code scanning
    steps:
      - uses: actions/checkout@<sha>
      - uses: depot/setup-action@<sha>
      - name: Build image (load locally for scan)
        uses: depot/build-push-action@<sha>
        with:
          project: ${{ vars.DEPOT_PROJECT_ID }}
          load: true
          tags: app:scan
      - name: Trivy scan (CRITICAL,HIGH gate)
        uses: aquasecurity/trivy-action@<sha>  # 0.x
        with:
          image-ref: app:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@<sha>
        with:
          sarif_file: trivy-results.sarif

  hadolint:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@<sha>
      - uses: hadolint/hadolint-action@<sha>  # v3.x
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
