# Main deploy — runs on every push to main.
# Builds multi-arch via Depot, pushes to registry via OIDC, deploys to env "production".
# Source: guides/09-pipeline-shapes.md §2, guides/06-actions-security.md, guides/07-depot-integration.md.

name: Main deploy

on:
  push:
    branches: [main]

# Never cancel a deploy mid-flight.
concurrency:
  group: main-deploy
  cancel-in-progress: false

permissions: {}

jobs:
  build-push:
    uses: ./.github/workflows/reusable-build.yml
    permissions:
      contents: read
      id-token: write    # Depot OIDC
      packages: write    # GHCR push
    with:
      push: true
      platforms: linux/amd64,linux/arm64
      tags: |
        ghcr.io/${{ github.repository }}:main
        ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
      sbom: false
      provenance: "false"

  scan:
    needs: build-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@<sha>
      - uses: aquasecurity/trivy-action@<sha>
        with:
          image-ref: ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0    # main-branch scan is reporting-only; PR build is the gate
      - if: always()
        uses: github/codeql-action/upload-sarif@<sha>
        with:
          sarif_file: trivy-results.sarif

  deploy:
    needs: build-push
    runs-on: ubuntu-24.04
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read
      id-token: write    # cloud OIDC
    steps:
      - uses: actions/checkout@<sha>

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@<sha>  # v4.x
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      # Migration step (db-worker-bee owns the script content; devops-worker-bee wires it in).
      - name: Run database migrations
        run: ./scripts/run-migrations.sh
        env:
          DATABASE_URL_SECRET_ARN: ${{ vars.DATABASE_URL_SECRET_ARN }}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }}
