# Snyk CI Gate - GitHub Actions Step
# Gate: high and critical severity only; only fail when an upgrade exists
# Source: guides/01-vulnerability-triage.md, guides/00-scanner-decision-matrix.md

# Add to your existing CI workflow (e.g., .github/workflows/ci.yml)

# Required: add SNYK_TOKEN to GitHub repository secrets
# Get your token at: https://app.snyk.io/account

      # --- Snyk security scan (add to your existing jobs.build.steps) ---

      - name: Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: false      # true if you want advisory-only (non-blocking)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          # --severity-threshold=high: only report high + critical (not low/medium)
          # --fail-on=upgradable: only fail CI when an upgrade path exists
          # This prevents blocking deployments for CVEs with no available fix
          args: >-
            --severity-threshold=high
            --fail-on=upgradable
            --json-file-output=snyk-results.json

      # Optional: Upload Snyk results as artifact for review
      - name: Upload Snyk results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk-results.json
          retention-days: 30

