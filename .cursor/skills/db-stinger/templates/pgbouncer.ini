; PgBouncer config — db-stinger template
;
; Sane defaults for a serverless / web workload running PgBouncer in front of
; a single Postgres database. Tune pool_size and max_client_conn to your
; Postgres `max_connections` and number of PgBouncer instances.
;
; Source: guides/05-performance-pooling.md, research/2026-04-25-autovacuum-explain-pgbouncer.md.

[databases]
; Map app-facing DB name to the upstream Postgres connection.
app = host=primary.internal port=5432 dbname=app

[pgbouncer]

; ----- Connection mode -----
; transaction = release the server connection back to the pool after each transaction.
;               Required for serverless / Lambda; the default for almost every web app.
;               Caveats: no LISTEN/NOTIFY across transactions, no session SET, prepared
;               statements broken on PG < 14 (use libpq-disable-prepared-statement-cache
;               or upgrade to PG 14+ which solves it).
; session     = hold the server connection for the life of the client connection.
;               Use only when LISTEN/NOTIFY or session-level state is required.
pool_mode = transaction

; ----- Sizing -----
; max_client_conn = how many app/serverless instances can connect to PgBouncer at once.
; default_pool_size = how many server connections per (database, user) pair.
;
; Sizing rule:
;   default_pool_size = (postgres_max_connections - reserved_for_admin) / num_pgbouncer_instances
;
; Example: PG max_connections=200, reserve 20, run 4 PgBouncer instances → pool_size=45.
max_client_conn = 5000
default_pool_size = 45
reserve_pool_size = 5
reserve_pool_timeout = 5

; ----- Auth / users -----
; Prefer SCRAM (md5 is legacy). auth_query lets PgBouncer fetch credentials
; from Postgres so you don't replicate them in userlist.txt.
auth_type = scram-sha-256
auth_user = pgbouncer
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ----- Listeners -----
listen_addr = 0.0.0.0
listen_port = 6432

; ----- TLS upstream / downstream -----
; Use require + verify-full when downstream is TLS. Adjust to environment.
client_tls_sslmode = prefer
server_tls_sslmode = require

; ----- Limits -----
; Cap individual queries. Pair with statement_timeout in Postgres for defense in depth.
query_timeout = 30
query_wait_timeout = 30
client_idle_timeout = 0
server_idle_timeout = 600
server_lifetime = 3600

; ----- Logging -----
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

; ----- Stats -----
stats_period = 60
stats_users = pgbouncer

; -----------------------------------------------------------------------------
; Notes:
;
; 1. For Supabase, Supavisor takes the place of PgBouncer and handles
;    transaction-mode prepared statements correctly on PG 14+. The above is
;    for self-hosted Postgres or platforms without an integrated pooler.
;
; 2. For Neon serverless, prefer the @neondatabase/serverless driver (HTTP /
;    WebSocket) over PgBouncer in the data path; PgBouncer still useful for
;    long-running workers.
;
; 3. Transaction mode + Prisma: set ?pgbouncer=true on the connection string
;    so Prisma disables prepared statements in its connection.
