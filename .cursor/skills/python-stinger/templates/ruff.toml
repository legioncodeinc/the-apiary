# Standalone Ruff config — alternative to the [tool.ruff] block in pyproject.toml.
# If both exist, ruff.toml takes precedence (see https://docs.astral.sh/ruff/configuration/).
# Drop the `[tool.ruff]` and `[tool.ruff.*]` prefixes when using this file.

line-length = 88
indent-width = 4
target-version = "py312"
exclude = [
    ".bzr", ".direnv", ".eggs", ".git", ".git-rewrite", ".hg",
    ".ipynb_checkpoints", ".mypy_cache", ".nox", ".pants.d",
    ".pyenv", ".pytest_cache", ".pytype", ".ruff_cache", ".svn",
    ".tox", ".venv", ".vscode",
    "__pypackages__", "_build", "buck-out", "build", "dist",
    "node_modules", "site-packages", "venv",
    "**/migrations",
]

[lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # Pyflakes
    "I",     # isort
    "UP",    # pyupgrade
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
    "DJ",    # flake8-django
    "ASYNC", # flake8-async
    "C4",    # flake8-comprehensions
    "S",     # flake8-bandit
    "RUF",   # Ruff-specific
    "PT",    # flake8-pytest-style
    "T20",   # flake8-print
]
ignore = [
    "E501",  # line length — handled by formatter
    "S101",  # assert — narrowed below
    "B008",  # function call as default arg — Ninja/FastAPI Depends/Query
    "B905",  # zip without strict — too noisy on legacy
]
unfixable = ["F841"]

[lint.per-file-ignores]
"**/tests/**" = ["S101", "S106", "S311"]
"**/conftest.py" = ["S101"]
"**/migrations/**" = ["E", "F", "I", "UP", "B", "SIM"]
"**/__init__.py" = ["F401"]
"**/settings/**.py" = ["F405", "F403"]

[lint.isort]
known-first-party = ["apps", "config"]
combine-as-imports = true
force-sort-within-sections = true

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "ninja.Query"]

[lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
