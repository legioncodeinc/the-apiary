<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{Example Name}} — {{Product}} Design System</title>
  <link rel="stylesheet" href="_shared.css" />
  <style>
    /* Page-local styles only. If you write a dozen of these, a utility
       is missing from _shared.css — promote it. */
    body {
      background: var(--color-background);
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      margin: 0;
      padding: var(--space-6);
    }
    .gallery {
      display: grid;
      gap: var(--space-6);
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { font-size: var(--text-22); margin: 0 0 var(--space-4); }
    h2 { font-size: var(--text-14); color: var(--color-text-muted); margin: 0 0 var(--space-3); text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <main class="gallery">
    <h1>{{Example Name}}</h1>

    <section class="glass-surface depth-1" style="padding: var(--space-4);">
      <h2>{{Section title}}</h2>
      <!-- Content using utility classes from _shared.css -->
    </section>

    <!-- Add more sections here. Each section is a glass-surface with
         depth-1 or depth-2, padded with var(--space-4) or --space-5. -->

  </main>
</body>
</html>
