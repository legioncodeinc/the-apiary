# Redoc configuration template
# Place at: docs/redoc-config.yaml (or inline in build command)
# Usage: npx @redocly/cli build-docs openapi.yaml --config redoc-config.yaml --output index.html

apis:
  main@v1:
    root: ./openapi.yaml
    label: v1

# Theme customization
theme:
  colors:
    primary:
      main: "#0066cc"          # Replace with brand color
      contrastText: "#ffffff"
  typography:
    fontSize: "15px"
    fontFamily: "Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    headings:
      fontFamily: "Inter, -apple-system, sans-serif"
  sidebar:
    width: "280px"
    backgroundColor: "#f8f9fa"
  logo:
    maxHeight: "40px"

# Navigation
sidebarLinks:
  - label: "Home"
    link: "/"
  - label: "Getting Started"
    link: "/docs/quickstart"

# Content settings
generatedPayloadSamplesMaxDepth: 8
hideDownloadButton: false
requiredPropsFirst: true
sortPropsAlphabetically: false
```
